name: Deploy frontend (GitHub Pages)

# 프론트(Vite 정적)를 GitHub Pages로 배포.
# 사전 준비(1회):
#   - 레포 Settings → Pages → Source: "GitHub Actions" 선택
#   - 레포 Settings → Secrets and variables → Actions → Variables 에
#       VITE_WS_BASE = wss://tour-agent.fly.dev   (백엔드 Fly 주소; 본인 앱 도메인으로)
# 산출물 사이트: https://<user>.github.io/tour-agent/

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci || npm install
      - name: 빌드 (GH Pages 서브경로 base + 백엔드 WS 주소 주입)
        env:
          VITE_BASE: /tour-agent/
          VITE_WS_BASE: ${{ vars.VITE_WS_BASE }}
        run: |
          if [ -z "$VITE_WS_BASE" ]; then
            echo "::warning::VITE_WS_BASE 변수 미설정 — 프론트가 백엔드(WS)에 못 붙습니다. 레포 Variables에 설정하세요."
          fi
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
