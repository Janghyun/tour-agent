name: Deploy backend (Fly.io)

# main 푸시(백엔드 관련 파일) 또는 수동 실행. FLY_API_TOKEN 시크릿이 있을 때만 동작.
# 프론트(GitHub Pages)는 pages.yml 워크플로에서 별도로 배포한다.
# 필요한 것:
#   secrets.FLY_API_TOKEN   — Fly 배포 토큰 (`fly tokens create deploy` 로 발급)
# 런타임 키는 레포/CI가 아니라 Fly 시크릿으로 주입:
#   fly secrets set ANTHROPIC_API_KEY=... KAKAO_REST_API_KEY=... \
#                   NAVER_CLIENT_ID=... NAVER_CLIENT_SECRET=... \
#                   SUPABASE_URL=... SUPABASE_KEY=...

on:
  push:
    branches: [main]
    paths: ["src/**", "requirements.txt", "Dockerfile", "fly.toml", ".github/workflows/deploy.yml"]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: 백엔드 배포 (Fly.io)
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: 시크릿 확인
        id: guard
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN 미설정 — 백엔드 배포 건너뜀."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.ok == 'true'
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.guard.outputs.ok == 'true'
      - name: flyctl deploy
        if: steps.guard.outputs.ok == 'true'
        run: flyctl deploy --remote-only
